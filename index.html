<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GDEI Coxcomb</title>
  <!-- Looker Studio Community Viz runtime -->
  <script src="https://www.gstatic.com/datastudio/v1/community.min.js"></script>
  <!-- D3 v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; font-family: Arial, sans-serif; }
    #root { height:100%; width:100%; display:flex; align-items:center; justify-content:center; }
    svg { width: 100%; height: 100%; }
    .label { font-size: 12px; fill: #444; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    function render(ds) {
      const style = ds.style || {};
      const maxValue = Number(style.maxValue ?? 3);
      const showRing = (style.showRing !== false);

      // Extract rows: [{factor, value}, ...]
      const rows = (ds.tables?.DEFAULT || []).map(r => ({
        factor: String(r.dimID0 ?? r.dim0 ?? r.dimensions?.[0] ?? r[0] ?? '').trim(),
        value: + (r.metricID0 ?? r.met0 ?? r.metrics?.[0] ?? r[1] ?? NaN)
      })).filter(d => d.factor && Number.isFinite(d.value));

      const root = d3.select("#root");
      root.selectAll("*").remove();

      if (!rows.length) {
        root.append("div").style("padding","16px").style("text-align","center")
            .text("No data. Add a Dimension = factor and a Metric = value.");
        return;
      }

      // Dimensions
      const bbox = root.node().getBoundingClientRect();
      const W = Math.max(280, bbox.width || 400);
      const H = Math.max(280, bbox.height || 400);
      const R = Math.min(W, H) / 2 - 20;
      const cx = W / 2, cy = H / 2;

      // SVG
      const svg = root.append("svg").attr("viewBox", `0 0 ${W} ${H}`);
      const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

      // Scales
      const n = rows.length;
      const angle = (2 * Math.PI) / n;
      const r = d3.scaleLinear().domain([0, maxValue]).range([0, R]);

      // Wedges
      rows.forEach((d, i) => {
        const a0 = i * angle, a1 = (i + 1) * angle;

        // Sector path from center to arc at radius r(value)
        const path = d3.path();
        path.moveTo(0, 0);
        path.arc(0, 0, r(d.value), a0, a1);
        path.closePath();

        g.append("path")
          .attr("d", path.toString())
          .attr("fill", "#4e79a7")
          .attr("fill-opacity", 0.85)
          .attr("stroke", "white")
          .attr("stroke-width", 1);

        // Label at mid-angle
        const am = (a0 + a1) / 2;
        const lr = R + 12;
        g.append("text")
          .attr("class", "label")
          .attr("x", Math.cos(am) * lr)
          .attr("y", Math.sin(am) * lr)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .text(d.factor);

        // Optional inner value label
        const vr = Math.max(14, r(d.value) * 0.6);
        g.append("text")
          .attr("class", "label")
          .attr("x", Math.cos(am) * vr)
          .attr("y", Math.sin(am) * vr)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .style("fill", "#fff")
          .style("font-size", "11px")
          .text(d.value.toFixed(2));
      });

      // Optional outer reference ring (max scale circle)
      if (showRing) {
        g.append("circle")
          .attr("r", r(maxValue))
          .attr("fill", "none")
          .attr("stroke", "#ddd")
          .attr("stroke-width", 2);
      }
    }

    // Hook up to Looker Studio's data stream
    dscc.subscribeToData(
      (data) => {
        // Use Looker Studio's object transform to normalize fields
        render(data);
      },
      { transform: dscc.objectTransform }
    );
  </script>
</body>
</html>
